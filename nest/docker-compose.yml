services:
  postgres:
    image: postgres:16-alpine
    container_name: nest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-nest}
      POSTGRES_USER: ${DB_USERNAME:-nest}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nest}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USERNAME:-nest} -d ${DB_DATABASE:-nest}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
